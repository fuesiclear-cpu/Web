name: Build My APK
on: [push, workflow_dispatch] # Runs every time you save or when you click "Run"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build APK
        uses: darkshredder/website-to-apk-action@v2.1.0
        with:
          # This points to your main folder
          build-folder-path: './' 
          app-name: 'MyWebProject'
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: My-Clean-App
          path: 'apk/*.apk'

