name: Build My APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Build APK from URL
        # We use 'yes' to skip the interactive questions and keep it default
        run: |
          yes | bubblewrap init --manifest=https://fuesiclear-cpu.github.io/manifest.json
          bubblewrap build
          mkdir output
          cp *.apk output/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: My-Clean-App
          path: output/*.apk
