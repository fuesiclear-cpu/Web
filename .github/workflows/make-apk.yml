name: Build My APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build APK
        uses: jmshrv/pwa-to-apk@v1.1.0
        with:
          url: https://fuesiclear-cpu.github.io/
          name: MyWebProject

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: My-App-Package
          path: ./*.apk
