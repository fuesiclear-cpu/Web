name: Build My APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build APK
        uses: koddr/website-to-apk-action@v1
        with:
          url: https://fuesiclear-cpu.github.io/
          name: MyWebProject
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: My-Clean-App
          path: ./*.apk

